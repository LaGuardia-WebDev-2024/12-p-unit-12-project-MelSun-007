<!DOCTYPE html>
<html>
  <head>
    
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
   
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
       What is my favorite rock band 🎸
        <select id="movie-answer">
          <option value="movie1">Boston</option>
          <option value="movie2">Radiohead</option>
          <option value="movie3">Foo Fighters</option>
          <option value="movie4">The Beatles</option>
        </select>
      </label>
      <button type="submit">Check Band Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img id="movie-pic">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        my favorite art medium 
        <select id="book-answer">
          <option value="book1">Oil paint</option>
          <option value="book2">Sculpture</option>
          <option value="book3">ceramics</option>
          <option value="book4">print</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();
   $("#movie-pic").hide()
        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3") {
          $("#movie-text").text("Got it!"); 
          $("#movie-pic").attr("src","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxqHm3Xiu2DC8JSf22-R5pSZxq8olITsqwcw&s").show(1000)
        } 
         if (answer === "movie4") {
          $("#movie-text").text("Close!");
          $("#movie-pic").attr("src","https://upload.wikimedia.org/wikipedia/en/5/52/Meet_the_Beatles.jpg").show(1000)}
        if (answer === "movie1"){
          $("#movie-text").text("Not quite");
          $("#movie-pic").attr("src","https://upload.wikimedia.org/wikipedia/en/2/23/BostonBoston.jpg").show(1000)
        }
        if (answer === "movie2"){
          $("#movie-text").text("Try Again!");
          $("#movie-pic").attr("src","https://upload.wikimedia.org/wikipedia/en/0/0f/Radiohead.pablohoney.albumart.jpg").show(1000)
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("Yep");
           $("#movie-pic").attr("https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Caravaggio_-_La_vocazione_di_San_Matteo.jpg/1280px-Caravaggio_-_La_vocazione_di_San_Matteo.jpg").show(1000)
        }   
        else {
          $("#book-text").text("I enjoy it");
        }
      });
      
    </script>
    </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
